# Docker Compose — orchestrates the full pipeline
# Services: RSSHub (data source), pipeline (Python scraper + processor), hugo (static site)
#
# Usage:
#   docker compose up -d           # start everything
#   docker compose logs -f pipeline # watch the pipeline

services:
  # ── RSSHub: converts Weibo to RSS/Atom feeds ──
  rsshub:
    image: diygod/rsshub:chromium-bundled
    container_name: weibo-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=900
      - REQUEST_TIMEOUT=60
      - NODE_ENV=production
      - ZHIHU_COOKIES=z_c0="2|1:0|10:1781433898|4:z_c0|92:Mi4xMWF3VWNBWUFBQUQ0RTlqNTM0RnhIQ1lBQUFCZ0FsVk44ZE1iYXdBZjFsUmh2U09DQk1tRWVZU2wzaVFpMm5ocXV3|3a7a453c17350f3523d23f6e7942f1aa73f06775888d15212b36372e3c338ef6"
      - WEIBO_COOKIES=SUB=_2A25HNUN8DeRhGeJO4lcW-S_Eyz2IHXVkS9q0rDV8PUJbkNAbLU3HkW1NdNlrJWnpOH0DCX5W3sujZ-EkvqTirNN-
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1200/"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - weibo-net

  # ── Pipeline: Python scraper + AI processor + scheduler ──
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weibo-pipeline
    restart: unless-stopped
    depends_on:
      rsshub:
        condition: service_healthy
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - RSSHUB_BASE_URL=http://rsshub:1200
      - DATABASE_URL=sqlite+aiosqlite:///data/weibo.db
      - HUGO_CONTENT_DIR=/output/content
      - CYCLE_INTERVAL_MINUTES=20
      - SITE_BASE_PATH=/news
      - LOG_LEVEL=info
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./output:/output
    networks:
      - weibo-net

  # ── Hugo: builds the static site for evconduit.com ──
  hugo:
    image: hugomods/hugo:latest
    container_name: weibo-hugo
    restart: unless-stopped
    working_dir: /src
    depends_on:
      - pipeline
    volumes:
      - ./output:/src
      - ./output/public:/src/public
      - ./output/static:/src/static
      - ./hugo/themes:/src/themes
    command: >
      server
      --bind=0.0.0.0
      --port=1313
      --baseURL=https://www.evconduit.com
      --appendPort=false
      --watch
      --disableFastRender
    ports:
      - "1313:1313"
    networks:
      - weibo-net

  # ── nginx: reverse proxy with Weibo video proxy ──
  nginx:
    image: nginx:alpine
    container_name: weibo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hugo
    networks:
      - weibo-net

networks:
  weibo-net:
    driver: bridge
