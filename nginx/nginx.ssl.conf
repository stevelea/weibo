# nginx production SSL config for evconduit.com
# Requires SSL certificates in nginx/ssl/

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=30s ipv6=off;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name evconduit.com www.evconduit.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name evconduit.com www.evconduit.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Proxy Weibo video CDN with Referer header
        location /proxy/video/ {
            rewrite ^/proxy/video/(.*)$ /$1 break;
            proxy_pass https://f.video.weibocdn.com;
            proxy_set_header Host f.video.weibocdn.com;
            proxy_set_header Referer "https://weibo.com/";
            proxy_cache off;
            proxy_buffering off;
        }

        # Hugo static site
        location / {
            set $hugo_upstream hugo:1313;
            proxy_pass http://$hugo_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
