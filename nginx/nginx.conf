# nginx reverse proxy for evconduit.com
# Routes traffic to Hugo and proxies Weibo video requests with proper Referer headers

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Force IPv4 DNS resolution (Docker doesn't have IPv6)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name evconduit.com www.evconduit.com localhost;

        # Proxy Weibo video CDN requests with proper Referer header
        location /proxy/video/ {
            rewrite ^/proxy/video/(.*)$ /$1 break;
            proxy_pass https://f.video.weibocdn.com;
            proxy_set_header Host f.video.weibocdn.com;
            proxy_set_header Referer "https://weibo.com/";
            proxy_set_header User-Agent "Mozilla/5.0 (compatible; evconduit/1.0)";
            proxy_cache off;
            proxy_buffering off;
        }

        # Everything else goes to Hugo (runtime DNS resolution)
        location / {
            set $hugo_upstream hugo:1313;
            proxy_pass http://$hugo_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
